<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة منافس</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .btn-draw { background-color: #007bff; color: white; }
        .btn-down { background-color: #28a745; color: white; display: none; }
        #result { margin-top: 15px; display: none; }
        canvas { width: 100%; border-radius: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: #333;">بطاقة تهنئة العيد 🌙</h2>
    <input type="text" id="userName" placeholder="اكتب اسمك هنا">
    <button class="btn-draw" onclick="processCard()">تجهيز البطاقة ✨</button>
    
    <div id="result">
        <canvas id="cardCanvas"></canvas>
        <button class="btn-down" id="dlBtn" onclick="downloadCard()">حفظ الصورة 📥</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // تم تعديل الاسم هنا ليطابق الملف الذي رفعته مؤخراً
    img.src = 'card.png.png'; 

    function processCard() {
        const name = document.getElementById('userName').value;
        if (!name) return alert("لطفاً اكتب الاسم أولاً");

        if (!img.complete) return alert("جاري تحميل الصورة.. حاول مرة أخرى خلال لحظات");

        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        // تنسيق الاسم ليظهر بشكل احترافي
        ctx.fillStyle = "#ffffff"; 
        ctx.font = "bold 48px Arial"; 
        ctx.textAlign = "center";
        
        // إحداثيات المربع الأبيض في تصميمك
        ctx.fillText(name, canvas.width / 2, canvas.height * 0.76);

        document.getElementById('result').style.display = 'block';
        document.getElementById('dlBtn').style.display = 'block';
    }

    function downloadCard() {
        const link = document.createElement('a');
        link.download = 'eid_card_munafis.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
