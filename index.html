<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة معايدة منافس</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; background-color: #0056b3; color: white; }
        canvas { width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 1px solid #eee; }
        .down-btn { background-color: #28a745; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h3>بطاقة معايدة منافس 🌙</h3>
        <input type="text" id="nameInp" placeholder="اكتب اسمك هنا">
        <button onclick="draw()">تجهيز البطاقة ✨</button>
        <canvas id="c"></canvas>
        <button id="btnD" class="down-btn" onclick="down()">تحميل الصورة 📥</button>
    </div>

    <script>
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        const img = new Image();
        img.src = 'template.png'; // تأكد أن هذا الاسم يطابق ملف الصورة في GitHub

        function draw() {
            const name = document.getElementById('nameInp').value;
            if (!name) return alert("فضلاً اكتب الاسم");
            if (!img.complete) return alert("جاري تحميل القالب.. حاول ثانية");

            cvs.width = img.width;
            cvs.height = img.height;
            ctx.drawImage(img, 0, 0);
            ctx.fillStyle = "#ffffff"; 
            ctx.font = "bold 50px Arial";
            ctx.textAlign = "center";
            // الإحداثيات المناسبة للمربع الأبيض في تصميمك
            ctx.fillText(name, cvs.width / 2, cvs.height * 0.76); 

            cvs.style.display = 'block';
            document.getElementById('btnD').style.display = 'block';
        }

        function down() {
            const a = document.createElement('a');
            a.download = 'eid-card.png';
            a.href = cvs.toDataURL();
            a.click();
        }
    </script>
</body>
</html>
